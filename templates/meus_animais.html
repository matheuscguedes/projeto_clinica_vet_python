{% extends "base.html" %}
{% block content %}

<div style="max-width: 800px; margin: 0 auto;">
    <h2>🐾 Os Meus Animais</h2>

    {% if not animais %}
    <div style="padding: 20px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 5px;">
        Não tem animais associados à sua conta.
    </div>
    {% else %}
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
        {% for a in animais %}
        <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div style="font-size: 3em;">🐶</div>
            <h3>{{ a.nome }}</h3>
            <p><strong>Espécie:</strong> {{ a.especie }}</p>
            <p><strong>Raça:</strong> {{ a.raca }}</p>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <p style="margin-top: 20px;">
        <a href="{{ url_for('minhas_consultas') }}">Ver Consultas dos Animais →</a>
    </p>
</div>

{% endblock %}
