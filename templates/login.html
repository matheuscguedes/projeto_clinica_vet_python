{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-person-circle"></i> Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Insira o seu utilizador" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Insira a sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                <small>Clínica Veterinária Demo</small>
            </div>
        </div>
    </div>
</div>

{% endblock %}
