{% extends "base.html" %}

{% block content %}

<h2 class="text-center mb-4">✏️ Editar Perfil</h2>

<div class="row g-4 justify-content-center">

    <div class="col-md-6 col-lg-5">
        <div class="card h-100 shadow-sm border-primary">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-badge"></i> Atualizar Contactos</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="acao" value="editar_info">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Morada</label>
                        <textarea name="morada" class="form-control" rows="3">{{ dados.morada }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="telefone" class="form-control" value="{{ dados.telefone }}">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Guardar Dados</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6 col-lg-5">
        <div class="card h-100 shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-key-fill"></i> Alterar Senha</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="acao" value="mudar_senha">

                    <div class="mb-3">
                        <label class="form-label">Senha Atual</label>
                        <input type="password" name="senha_atual" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nova Senha</label>
                        <input type="password" name="nova_senha" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Confirmar Nova Senha</label>
                        <input type="password" name="confirmar_senha" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-danger w-100">Atualizar Senha</button>
                </form>
            </div>
        </div>
    </div>

</div>

<div class="text-center mt-4">
    <a href="{{ url_for('minha_conta') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar ao Perfil
    </a>
</div>

{% endblock %}
