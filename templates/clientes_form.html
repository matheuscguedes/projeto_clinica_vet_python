{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-person-lines-fill"></i>
                    {{ 'Editar Cliente' if cliente else 'Novo Cliente' }}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo *</label>
                        <input type="text" name="nome" class="form-control" required
                               value="{{ cliente.nome if cliente else '' }}" placeholder="Ex: João Silva">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email *</label>
                        <input type="email" name="email" class="form-control" required
                               value="{{ cliente.email if cliente else '' }}" placeholder="email@exemplo.com"
                               {% if cliente %}readonly style="background-color: #e9ecef;" {% endif %}>
                        {% if cliente %}
                        <div class="form-text text-muted">O email não pode ser alterado. Contacte o suporte.</div>
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="telefone" class="form-control"
                               value="{{ cliente.telefone if cliente else '' }}">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Morada</label>
                        <textarea name="morada" class="form-control" rows="3">{{ cliente.morada if cliente else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="{{ url_for('clientes_lista') }}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold">Guardar</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<div class="mt-4 mb-3">
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar ao Dashboard
    </a>
</div>

{% endblock %}
