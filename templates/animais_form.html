{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <i class="bi bi-github"></i> {{ 'Editar Animal' if animal else 'Novo Animal' }}
                </h4>
            </div>

            <div class="card-body">
                <form method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Dono (Cliente) *</label>
                        <select name="cliente_id" class="form-select" required>
                            {% if not animal %}
                            <option value="" disabled selected>-- Selecione um Cliente --</option>
                            {% endif %}

                            {% for c in clientes %}
                            <option value="{{ c.id }}" {% if animal and animal.cliente_id == c.id %}selected{% endif %}>
                                {{ c.nome }}
                            </option>
                            {% endfor %}
                        </select>
                        <div class="form-text">
                            Não encontra o cliente? <a href="{{ url_for('clientes_novo') }}">Crie-o primeiro aqui.</a>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Animal *</label>
                        <input type="text" name="nome" class="form-control" required
                               value="{{ animal.nome if animal else '' }}" placeholder="Ex: Bobby">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Espécie *</label>
                            <select name="especie" class="form-select" required>
                                {% set especies = ['Cão', 'Gato', 'Pássaro', 'Outro'] %}
                                {% for esp in especies %}
                                <option value="{{ esp }}" {% if animal and animal.especie==esp %}selected{% endif %}>
                                    {{ esp }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Raça</label>
                            <input type="text" name="raca" class="form-control"
                                   value="{{ animal.raca if animal else '' }}" placeholder="Ex: Labrador">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-3">
                        <a href="{{ url_for('animais_lista') }}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success fw-bold">Guardar</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<div class="mt-4 mb-3">
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar ao Dashboard
    </a>
</div>

{% endblock %}
